<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>X Tweaks Debug</title>
    <style>
      :root {
        color-scheme: light;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      body {
        margin: 0;
        background: #f4f7fb;
        color: #0f1419;
      }

      .toolbar,
      .panel {
        background: white;
        border: 1px solid #d7e0e8;
        border-radius: 16px;
        box-shadow: 0 12px 32px rgba(15, 20, 25, 0.08);
      }

      .page {
        max-width: 1400px;
        margin: 24px auto;
        padding: 0 16px;
      }

      .toolbar {
        display: flex;
        gap: 12px;
        align-items: center;
        padding: 16px;
        margin-bottom: 16px;
      }

      .toolbar button {
        border: 0;
        border-radius: 9999px;
        background: #1d9bf0;
        color: white;
        padding: 10px 14px;
        cursor: pointer;
      }

      .workspace {
        display: grid;
        grid-template-columns: minmax(0, 1fr) 360px;
        gap: 16px;
      }

      .panel {
        padding: 16px;
      }

      #fixture {
        min-height: 640px;
      }

      .x-shell {
        display: flex;
        justify-content: center;
        gap: 24px;
        padding: 24px;
      }

      .x-primary,
      .x-sidebar {
        background: white;
        border: 1px solid #d7e0e8;
        border-radius: 24px;
        padding: 16px;
      }

      .x-primary {
        width: min(680px, 100%);
      }

      .x-sidebar {
        width: 320px;
      }

      .chip {
        display: inline-flex;
        align-items: center;
        border: 1px solid #d7e0e8;
        border-radius: 9999px;
        padding: 8px 12px;
        background: #f7f9f9;
      }

      pre {
        white-space: pre-wrap;
        word-break: break-word;
      }
    </style>
  </head>
  <body>
    <div class="page">
      <div class="toolbar">
        <button id="render-home" type="button">Render Home Fixture</button>
        <button id="render-status" type="button">Render Status Fixture</button>
        <button id="add-live-chip" type="button">Add Live Chip</button>
        <button id="add-sidebar" type="button">Add Sidebar</button>
      </div>

      <div class="workspace">
        <div id="fixture" class="panel"></div>
        <div class="panel">
          <h2>State</h2>
          <pre id="state"></pre>
        </div>
      </div>
    </div>

    <script type="module" src="./main.js"></script>
  </body>
</html>
